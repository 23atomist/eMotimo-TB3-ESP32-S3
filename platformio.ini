; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Memory and Flash Settings for N16R8
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

monitor_speed = 115200

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_USB_HOST=0

; BLE-Gamepad-Client is vendored (with a static-init fix) in lib/ - see
; the "TB3 local patch" comments in lib/BLE-Gamepad-Client/src.
lib_deps =
  esp32async/AsyncTCP
  esp32async/ESPAsyncWebServer
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino@^2.3.2

[env:native]
platform = native
build_flags = -std=gnu++17
test_framework = unity
; Host tests cover only the pure formatter; keep the Arduino-dependent
; sources out of the native build so they never reach a non-Arduino toolchain.
test_build_src = yes
build_src_filter = -<*> +<tb3_lcd_pages.cpp>
