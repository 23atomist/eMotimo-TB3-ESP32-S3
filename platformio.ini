; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Memory and Flash Settings for N16R8
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

monitor_speed = 115200

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_USB_HOST=0

lib_deps =
  esp32async/AsyncTCP
  esp32async/ESPAsyncWebServer
  bblanchon/ArduinoJson

; Over-the-air upload (espota). Uncomment and set the address to flash
; wirelessly instead of over USB:
;   pio run -e esp32-s3-devkitc-1 -t upload --upload-port tb3.local
; upload_protocol = espota
; upload_port = tb3.local

; [env:native] (host unit test target) removed with the LCD subsystem (Task 6):
; it existed solely to host-test src/tb3_lcd_pages.cpp, which is deleted.
; test/test_lcd_pages/test_lcd_pages.cpp was removed alongside it.
